<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do List App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
  .container { background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 560px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: fit-content; }
  h1 { font-size: 22px; font-weight: 700; color: #1a202c; }
  .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 20px; margin-top: 2px; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
  .stat { background: #f8faff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; text-align: center; }
  .stat .num { font-size: 20px; font-weight: 700; color: #3b82f6; }
  .stat .lbl { font-size: 11px; color: #94a3b8; margin-top: 1px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-row input[type="text"] { flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; color: #1a202c; outline: none; transition: border 0.2s; }
  .input-row input[type="text"]:focus { border-color: #3b82f6; }
  .input-row button { padding: 10px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .input-row button:hover { background: #2563eb; }
  .input-sub { display: flex; gap: 8px; margin-bottom: 18px; }
  .input-sub select, .input-sub input[type="date"], .input-sub input[type="text"] { flex: 1; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 13px; color: #64748b; outline: none; background: #fff; cursor: pointer; }
  .input-sub select:focus, .input-sub input:focus { border-color: #3b82f6; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; }
  .filters { display: flex; gap: 5px; }
  .filters button { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid #e2e8f0; background: #fff; color: #64748b; transition: all 0.15s; }
  .filters button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .search-box { position: relative; }
  .search-box input { padding: 6px 12px 6px 30px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 13px; outline: none; width: 150px; }
  .search-box input:focus { border-color: #3b82f6; }
  .search-box span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #94a3b8; }
  .sort-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 12px; color: #94a3b8; }
  .sort-row select { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; outline: none; color: #64748b; }
  .progress-wrap { margin-bottom: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
  .progress-bar { height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.4s; }
  .todo-list { display: flex; flex-direction: column; gap: 7px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: #fff; transition: all 0.2s; }
  .todo-item:hover { border-color: #bfdbfe; background: #f8faff; }
  .todo-item.done { background: #f8faff; opacity: 0.7; }
  .todo-item.overdue { border-color: #fca5a5; background: #fff8f8; }
  .todo-item input[type="checkbox"] { width: 17px; height: 17px; accent-color: #3b82f6; cursor: pointer; flex-shrink: 0; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 14px; color: #1a202c; word-break: break-word; }
  .todo-item.done .todo-text { text-decoration: line-through; color: #94a3b8; }
  .todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .badge.low    { background: #dcfce7; color: #15803d; }
  .badge.medium { background: #fef3c7; color: #92400e; }
  .badge.high   { background: #fee2e2; color: #991b1b; }
  .cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #ede9fe; color: #5b21b6; font-weight: 500; }
  .due-tag { font-size: 11px; color: #94a3b8; }
  .due-tag.overdue { color: #ef4444; font-weight: 600; }
  .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 16px; padding: 2px 4px; border-radius: 6px; transition: all 0.15s; }
  .icon-btn:hover.edit { color: #3b82f6; background: #dbeafe; }
  .icon-btn:hover.del  { color: #ef4444; background: #fee2e2; }
  .edit-input { font-size: 14px; border: 1.5px solid #3b82f6; border-radius: 8px; padding: 3px 8px; outline: none; width: 100%; }
  .empty { text-align: center; padding: 30px 0; color: #94a3b8; font-size: 14px; }
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: 12px; color: #94a3b8; }
  .clear-btn { background: none; border: none; font-size: 12px; color: #ef4444; cursor: pointer; }
  .clear-btn:hover { text-decoration: underline; }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .dark-btn { background: #f1f5f9; border: none; border-radius: 8px; padding: 6px 10px; font-size: 16px; cursor: pointer; }
  body.dark { background: #0f172a; }
  body.dark .container { background: #1e293b; box-shadow: none; border: 1px solid #334155; }
  body.dark h1, body.dark .todo-text { color: #f1f5f9; }
  body.dark .subtitle, body.dark .due-tag, body.dark .footer, body.dark .sort-row { color: #64748b; }
  body.dark .todo-item { background: #1e293b; border-color: #334155; }
  body.dark .todo-item:hover { background: #263348; border-color: #475569; }
  body.dark .todo-item.done { background: #1a2438; }
  body.dark .stat { background: #263348; border-color: #334155; }
  body.dark .input-row input[type="text"], body.dark .input-sub select,
  body.dark .input-sub input, body.dark .search-box input, body.dark .sort-row select { background: #263348; border-color: #334155; color: #f1f5f9; }
  body.dark .filters button { background: #263348; border-color: #334155; color: #94a3b8; }
  body.dark .filters button.active { background: #3b82f6; color: #fff; }
  body.dark .progress-bar { background: #263348; }
  body.dark .dark-btn { background: #334155; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div>
      <h1>📝 To-Do List</h1>
      <p class="subtitle" id="dateLabel"></p>
    </div>
    <button class="dark-btn" onclick="toggleDark()">🌙</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="sTot">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="num" id="sAct" style="color:#f59e0b">0</div><div class="lbl">Active</div></div>
    <div class="stat"><div class="num" id="sDone" style="color:#22c55e">0</div><div class="lbl">Done</div></div>
    <div class="stat"><div class="num" id="sOver" style="color:#ef4444">0</div><div class="lbl">Overdue</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label"><span>Overall progress</span><span id="pctLabel">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="What needs to be done?" />
    <button onclick="addTask()">Add</button>
  </div>
  <div class="input-sub">
    <select id="prioritySelect">
      <option value="low">🟢 Low</option>
      <option value="medium" selected>🟡 Medium</option>
      <option value="high">🔴 High</option>
    </select>
    <input type="text" id="catInput" placeholder="Category (e.g. Work)" />
    <input type="date" id="dueInput" />
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="active" onclick="setFilter('all',this)">All</button>
      <button onclick="setFilter('active',this)">Active</button>
      <button onclick="setFilter('done',this)">Done</button>
      <button onclick="setFilter('overdue',this)">Overdue</button>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search..." oninput="render()" />
    </div>
  </div>

  <div class="sort-row">
    Sort by:
    <select id="sortSelect" onchange="render()">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="priority">Priority</option>
      <option value="due">Due date</option>
      <option value="az">A → Z</option>
    </select>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="footer">
    <span id="countLabel"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>
</div>

<script>
  let tasks = [
    { id:1, text:'Submit assignment', priority:'high', cat:'College', due:'2024-12-10', done:false },
    { id:2, text:'Read Chapter 5', priority:'medium', cat:'Study', due:'2024-12-15', done:false },
    { id:3, text:'Buy groceries', priority:'low', cat:'Personal', due:'', done:true },
  ];
  let filter = 'all';
  let editingId = null;

  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

  function addTask() {
    const text = document.getElementById('taskInput').value.trim();
    if(!text) return;
    tasks.push({
      id: Date.now(),
      text,
      priority: document.getElementById('prioritySelect').value,
      cat: document.getElementById('catInput').value.trim(),
      due: document.getElementById('dueInput').value,
      done: false
    });
    document.getElementById('taskInput').value = '';
    document.getElementById('catInput').value = '';
    document.getElementById('dueInput').value = '';
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id!==id);
    render();
  }

  function startEdit(id) {
    editingId = id;
    render();
    const inp = document.getElementById('edit-'+id);
    if(inp) { inp.focus(); inp.select(); }
  }

  function saveEdit(id) {
    const inp = document.getElementById('edit-'+id);
    if(inp) tasks = tasks.map(t => t.id===id ? {...t, text: inp.value.trim()||t.text} : t);
    editingId = null;
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function toggleDark() {
    document.body.classList.toggle('dark');
  }

  function isOverdue(task) {
    return !task.done && task.due && new Date(task.due) < new Date(new Date().toDateString());
  }

  function priorityRank(p) { return p==='high'?0:p==='medium'?1:2; }

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort   = document.getElementById('sortSelect').value;

    let list = [...tasks];

    if(filter==='active')  list = list.filter(t => !t.done);
    if(filter==='done')    list = list.filter(t => t.done);
    if(filter==='overdue') list = list.filter(isOverdue);

    if(search) list = list.filter(t => t.text.toLowerCase().includes(search) || t.cat.toLowerCase().includes(search));

    if(sort==='oldest')        list.sort((a,b)=>a.id-b.id);
    else if(sort==='newest')   list.sort((a,b)=>b.id-a.id);
    else if(sort==='priority') list.sort((a,b)=>priorityRank(a.priority)-priorityRank(b.priority));
    else if(sort==='due')      list.sort((a,b)=>{ if(!a.due) return 1; if(!b.due) return -1; return a.due.localeCompare(b.due); });
    else if(sort==='az')       list.sort((a,b)=>a.text.localeCompare(b.text));

    const container = document.getElementById('todoList');
    if(list.length===0) {
      container.innerHTML = '<div class="empty">Nothing here 🎉</div>';
    } else {
      container.innerHTML = list.map(t => {
        const overdue = isOverdue(t);
        const dueStr = t.due ? new Date(t.due).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
        const editing = editingId===t.id;
        return `
          <div class="todo-item ${t.done?'done':''} ${overdue?'overdue':''}">
            <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" />
            <div class="todo-body">
              ${editing
                ? `<input class="edit-input" id="edit-${t.id}" value="${t.text.replace(/"/g,'&quot;')}"
                     onblur="saveEdit(${t.id})" onkeydown="if(event.key==='Enter')saveEdit(${t.id})" />`
                : `<div class="todo-text">${t.text}</div>`
              }
              <div class="todo-meta">
                <span class="badge ${t.priority}">${t.priority}</span>
                ${t.cat ? `<span class="cat-tag">${t.cat}</span>` : ''}
                ${dueStr ? `<span class="due-tag ${overdue?'overdue':''}">📅 ${dueStr}${overdue?' · overdue':''}</span>` : ''}
              </div>
            </div>
            <div class="todo-actions">
              <button class="icon-btn edit" onclick="startEdit(${t.id})">✏️</button>
              <button class="icon-btn del"  onclick="deleteTask(${t.id})">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    const total   = tasks.length;
    const done    = tasks.filter(t=>t.done).length;
    const active  = tasks.filter(t=>!t.done).length;
    const overdue = tasks.filter(isOverdue).length;
    const pct     = total ? Math.round((done/total)*100) : 0;
    document.getElementById('sTot').textContent  = total;
    document.getElementById('sAct').textContent  = active;
    document.getElementById('sDone').textContent = done;
    document.getElementById('sOver').textContent = overdue;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('pctLabel').textContent = pct+'%';
    document.getElementById('countLabel').textContent = `${active} task${active!==1?'s':''} remaining`;
  }

  render();
</script>
</body>
</html>
